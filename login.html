<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VSCode Dev</title>
    <meta name="description" content="Sign in to your VSCode Dev developer console.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- UI Framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#020617',
                        'dark-elevated': '#0f172a',
                        'accent-cyan': '#06b6d4',
                        'accent-violet': '#8b5cf6',
                        'accent-emerald': '#10b981',
                        'accent-rose': '#f43f5e',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m18 16 4-4-4-4'/><path d='m6 8-4 4 4 4'/><path d='m14.5 4-5 16'/></svg>">


    <style>
        .auth-bg {
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased overflow-x-hidden auth-bg">
    <!-- Global Animation Background (Removed) -->


    <!-- Full-screen centered layout, no nav or footer -->
    <main class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="glass rounded-3xl p-6 sm:p-10 border border-white/10 shadow-2xl shadow-accent-cyan/5">

                <!-- Logo (matches navbar exactly) -->
                <a href="index.html" class="flex items-center gap-3 mb-10 group w-fit mx-auto">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent-cyan to-accent-violet flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-500 shadow-lg shadow-accent-cyan/30">
                        <i data-lucide="code-2" class="w-7 h-7 text-white"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight text-white">
                        VSCode<span class="text-accent-cyan">Dev</span>
                    </span>
                </a>

                <!-- Heading -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-white mb-1">Welcome Back</h1>
                    <p class="text-gray-500 text-sm">Sign in to your developer console</p>
                </div>

                <!-- Form Fields -->
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                        <input
                            id="login-email"
                            type="email"
                            class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-cyan transition-all text-white placeholder-gray-600"
                            placeholder="Enter your email"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                        <input
                            id="login-password"
                            type="password"
                            class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-cyan transition-all text-white placeholder-gray-600"
                            placeholder="••••••••"
                        >
                    </div>

                    <div class="flex items-center justify-between text-[11px] sm:text-sm">
                        <label class="flex items-center gap-2 text-gray-400 cursor-pointer whitespace-nowrap">
                            <input type="checkbox" class="rounded border-white/20 bg-dark-elevated accent-accent-cyan">
                            Remember me
                        </label>
                        <a href="#" class="text-accent-cyan hover:underline whitespace-nowrap">Forgot password?</a>
                    </div>

                    <a href="dashboard.html"
                        class="block w-full py-4 rounded-xl bg-gradient-to-r from-accent-cyan to-accent-violet text-white text-center font-bold text-sm tracking-wide hover:shadow-lg hover:shadow-accent-cyan/30 transition-all transform hover:-translate-y-0.5">
                        Sign In
                    </a>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-xs text-gray-600 uppercase tracking-widest">or continue with</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <!-- Social Logins -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all text-sm font-medium">
                        <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                        <span>Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all text-sm font-medium">
                        <i data-lucide="github" class="w-5 h-5"></i>
                        <span>GitHub</span>
                    </button>
                </div>

                <!-- Register Link -->
                <p class="text-center text-sm text-gray-500">
                    Don't have an account?
                    <a href="register.html" class="text-accent-cyan font-semibold hover:underline ml-1">Create one</a>
                </p>
            </div>

            <!-- Back to site -->
            <p class="text-center text-xs text-gray-600 mt-6">
                <a href="index.html" class="hover:text-gray-400 transition-colors flex items-center justify-center gap-1">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to homepage
                </a>
            </p>
        </div>
    </main>

    <!-- Back to Top Button -->
    <button id="backToTop" class="fixed bottom-8 right-8 w-12 h-12 rounded-full glass border border-white/10 flex items-center justify-center text-white opacity-0 translate-y-10 transition-all duration-300 z-[100] hover:bg-accent-cyan hover:border-accent-cyan group">
        <i data-lucide="arrow-up" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
    </button>

    <!-- Scripts -->

    <script src="main.js"></script>
</body>
</html>
