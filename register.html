<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VSCode Dev</title>
    <meta name="description" content="Create your VSCode Dev developer account.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- UI Framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#020617',
                        'dark-elevated': '#0f172a',
                        'accent-cyan': '#06b6d4',
                        'accent-violet': '#8b5cf6',
                        'accent-emerald': '#10b981',
                        'accent-rose': '#f43f5e',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m18 16 4-4-4-4'/><path d='m6 8-4 4 4 4'/><path d='m14.5 4-5 16'/></svg>">

    <style>
        .auth-bg {
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased overflow-x-hidden auth-bg">

    <main class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="glass rounded-3xl p-6 sm:p-10 border border-white/10 shadow-2xl shadow-accent-violet/5">

                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 mb-10 group w-fit mx-auto">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent-cyan to-accent-violet flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-500 shadow-lg shadow-accent-cyan/30">
                        <i data-lucide="code-2" class="w-7 h-7 text-white"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight text-white">
                        VSCode<span class="text-accent-cyan">Dev</span>
                    </span>
                </a>

                <!-- Heading -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-white mb-1">Create Account</h1>
                    <p class="text-gray-500 text-sm">Join the elite developer community</p>
                </div>

                <!-- Form Fields -->
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-400">First Name</label>
                            <input type="text" class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-violet transition-all text-white placeholder-gray-700" placeholder="John">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-400">Last Name</label>
                            <input type="text" class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-violet transition-all text-white placeholder-gray-700" placeholder="Doe">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                        <input type="email" class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-violet transition-all text-white placeholder-gray-700" placeholder="john@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                        <input type="password" class="w-full bg-dark-elevated border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent-violet transition-all text-white placeholder-gray-700" placeholder="••••••••">
                    </div>

                    <div class="space-y-4 pt-2">
                        <label class="flex items-start gap-3 text-xs text-gray-500 cursor-pointer group">
                            <input type="checkbox" class="mt-1 rounded border-white/20 bg-dark-elevated accent-accent-violet">
                            <span>I agree to the <a href="#" class="text-accent-violet hover:underline">Terms of Service</a> and <a href="#" class="text-accent-violet hover:underline">Privacy Policy</a>.</span>
                        </label>
                    </div>

                    <a href="dashboard.html"
                        class="block w-full py-4 rounded-xl bg-gradient-to-r from-accent-violet to-accent-rose text-white text-center font-bold text-sm tracking-wide hover:shadow-lg hover:shadow-accent-violet/30 transition-all transform hover:-translate-y-0.5">
                        Create Account
                    </a>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-xs text-gray-600 uppercase tracking-widest">or</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-500">
                    Already have an account?
                    <a href="login.html" class="text-accent-violet font-semibold hover:underline ml-1">Sign In</a>
                </p>
            </div>

            <!-- Back to site -->
            <p class="text-center text-xs text-gray-600 mt-6">
                <a href="index.html" class="hover:text-gray-400 transition-colors flex items-center justify-center gap-1">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to homepage
                </a>
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="main.js"></script>
</body>
</html>
